name: dinov2
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=24
  - setuptools>=70
  - wheel
  - git
  - ninja
  - cmake
  - pkg-config
  - pip:
      - --index-url https://download.pytorch.org/whl/cu128
      - torch==2.10.0
      - torchvision==0.25.0
      - torchaudio==2.10.0
      - --extra-index-url https://pypi.org/simple
      - omegaconf
      - torchmetrics==0.10.3
      - fvcore
      - iopath
      - submitit
      - scikit-learn
variables:
  XFORMERS_DISABLED: "1"
